<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Unfolded Events">
  <rect width="100" height="100" rx="22" fill="#1C1814"/>
  <g fill="none" stroke="#B08D57" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- front leg (crosses) -->
    <line x1="35" y1="53" x2="61" y2="82"/>
    <!-- back + rear leg, one continuous line -->
    <polyline points="64,20 60,53 37,82"/>
    <!-- seat -->
    <line x1="35" y1="53" x2="60" y2="53"/>
  </g>
</svg>